<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#2f6bff" />
<title>小助理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --c-bg:#f4f6fb;
  --c-card:#ffffff;
  --c-ink:#1a2138;
  --c-sub:#6b7385;
  --c-line:#eaeef5;
  --c-primary:#3b6cf6;
  --c-primary-soft:#eaf0ff;
  --c-primary-deep:#2c51c9;
  --c-red:#e5484d;
  --c-green:#15a06b;
  --c-orange:#f5872b;
  --c-yellow:#e8b53a;
  --c-purple:#7c5cf6;
  --c-cyan:#0ea5b7;
  --radius:20px;
  --radius-sm:13px;
  --shadow:0 1px 2px rgba(17,24,40,.04), 0 8px 24px rgba(17,24,40,.06);
  --shadow-sm:0 1px 2px rgba(17,24,40,.05);
  --nav-h:62px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --font:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--c-bg);color:var(--c-ink);font-family:var(--font);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body{overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--c-ink);}
a{color:var(--c-primary);text-decoration:none;}
::-webkit-scrollbar{width:0;height:0;}

/* layout */
#app{display:flex;min-height:100vh;background:var(--c-bg);}
#main{flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;margin-left:248px;transition:margin-left .22s cubic-bezier(.22,1,.36,1);}
#view{flex:1;padding:22px 22px 48px;max-width:820px;margin:0 auto;width:100%;animation:fade .3s ease;}

/* sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:248px;flex-shrink:0;background:var(--c-card);
  border-right:1px solid var(--c-line);display:flex;flex-direction:column;z-index:60;
  transition:width .22s cubic-bezier(.22,1,.36,1),transform .28s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow);}
.sb-top{display:flex;align-items:center;justify-content:space-between;padding:16px 14px;border-bottom:1px solid var(--c-line);}
.sb-brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;letter-spacing:-.01em;overflow:hidden;white-space:nowrap;}
.sb-logo{font-size:22px;flex-shrink:0;}
.sb-name{flex-shrink:0;}
.sb-toggle{width:32px;height:32px;border-radius:10px;background:var(--c-bg);color:var(--c-sub);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .15s;}
.sb-toggle:active{transform:scale(.92);}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.sb-sec{padding:4px 0;}
.sb-sec-head{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 4px;color:var(--c-sub);font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;user-select:none;}
.sb-sec-head .arr{font-size:10px;transition:transform .2s;opacity:.7;}
.sb-sec.collapsed .sb-group{display:none;}
.sb-sec.collapsed .arr{transform:rotate(-90deg);}
.sb-group{margin-top:2px;}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;margin:2px 8px;border-radius:12px;color:var(--c-sub);font-weight:600;font-size:14px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;overflow:hidden;}
.sb-item .ico{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.sb-item .lab{flex-shrink:0;}
.sb-item:hover{background:var(--c-bg);color:var(--c-ink);}
.sb-item.active{background:var(--c-primary-soft);color:var(--c-primary);}
.sb-foot{padding:10px 0;border-top:1px solid var(--c-line);margin-top:auto;}
.sb-overlay{display:none;}

/* topbar (mobile) */
.topbar{display:none;align-items:center;gap:12px;padding:11px 14px;background:rgba(255,255,255,.86);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--c-line);position:sticky;top:0;z-index:40;}
.menu-btn{width:40px;height:40px;border-radius:12px;background:var(--c-card);border:1px solid var(--c-line);font-size:17px;display:none;align-items:center;justify-content:center;flex-shrink:0;color:var(--c-ink);}
.topbar-title{font-weight:800;font-size:16px;letter-spacing:-.01em;}

/* collapsed (desktop icon rail) */
body.sb-collapsed .sidebar{width:72px;}
body.sb-collapsed #main{margin-left:72px;}
body.sb-collapsed .sb-name,body.sb-collapsed .sb-sec-head span:first-child,body.sb-collapsed .sb-item .lab,body.sb-collapsed .sb-sec-head .arr{display:none;}
body.sb-collapsed .sb-sec-head{justify-content:center;padding:8px 0 4px;}
body.sb-collapsed .sb-item{justify-content:center;margin:2px 8px;padding:11px 0;}
body.sb-collapsed .sb-top{justify-content:center;padding:16px 0;}

/* mobile drawer */
@media(max-width:820px){
  .sidebar{transform:translateX(-100%);width:260px;box-shadow:0 20px 50px rgba(17,24,40,.18);}
  body.sb-open .sidebar{transform:translateX(0);}
  #main{margin-left:0;}
  body.sb-collapsed #main{margin-left:0;}
  .menu-btn{display:flex;}
  .sb-toggle{display:none;}
  .topbar{display:flex;}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(17,22,38,.4);z-index:55;}
  body.sb-open .sb-overlay{display:block;}
}

/* header */
.page-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 16px;}
.page-head h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.02em;}
.page-head .sub{color:var(--c-sub);font-size:12px;margin-top:2px;}
.icon-btn{width:40px;height:40px;border-radius:13px;background:var(--c-card);box-shadow:var(--shadow-sm);border:1px solid var(--c-line);
  display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s,box-shadow .2s;}
.icon-btn:active{transform:scale(.94);}

/* cards */
.card{background:var(--c-card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:13px;
  border:1px solid rgba(234,238,245,.6);transition:transform .2s ease,box-shadow .2s ease;}
@media(hover:hover){.card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(17,24,40,.05),0 12px 30px rgba(17,24,40,.09);}}
.card .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card .card-h .t{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;letter-spacing:-.01em;}
.card .card-h .t .dot{width:8px;height:8px;border-radius:50%;background:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-soft);}
.card .more{color:var(--c-sub);font-size:12px;}

/* grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;}
.stat{background:var(--c-bg);border-radius:var(--radius-sm);padding:12px;transition:background .2s;}
.stat .k{font-size:11px;color:var(--c-sub);font-weight:600;}
.stat .v{font-size:19px;font-weight:800;margin-top:3px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.stat .v small{font-size:11px;font-weight:600;color:var(--c-sub);}

/* progress */
.bar{height:9px;background:var(--c-line);border-radius:99px;overflow:hidden;}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--c-primary),#6f9bff);border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1);}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:14px;
  background:var(--c-primary);color:#fff;font-weight:700;font-size:15px;width:100%;
  box-shadow:0 4px 14px rgba(59,108,246,.28);transition:transform .12s,box-shadow .2s,filter .2s;}
.btn:active{transform:scale(.975);filter:brightness(.97);}
.btn.ghost{background:var(--c-primary-soft);color:var(--c-primary);box-shadow:none;}
.btn.soft{background:var(--c-bg);color:var(--c-ink);box-shadow:none;}
.btn.sm{padding:8px 14px;font-size:13px;width:auto;border-radius:11px;}
.btn-row{display:flex;gap:10px;}

/* list */
.list{display:flex;flex-direction:column;}
.li{display:flex;align-items:center;gap:11px;padding:13px 0;border-bottom:1px solid var(--c-line);}
.li:last-child{border-bottom:none;}
.li .main{flex:1;min-width:0;}
.li .title{font-weight:600;font-size:15px;}
.li .desc{font-size:12px;color:var(--c-sub);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li .right{color:var(--c-sub);font-size:13px;flex-shrink:0;font-weight:600;}

/* tags/badges */
.tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:99px;background:var(--c-bg);color:var(--c-sub);margin:2px 4px 2px 0;font-weight:600;}
.tag.r{background:#fdecec;color:var(--c-red);}
.tag.g{background:#e7f7ef;color:var(--c-green);}
.tag.b{background:var(--c-primary-soft);color:var(--c-primary);}
.tag.o{background:#fdf1e6;color:var(--c-orange);}
.tag.p{background:#f1ecfe;color:var(--c-purple);}
.pill{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;}
.pill.green{background:#e7f7ef;color:var(--c-green);}
.pill.red{background:#fdecec;color:var(--c-red);}
.pill.gray{background:var(--c-bg);color:var(--c-sub);}
.pill.blue{background:var(--c-primary-soft);color:var(--c-primary);}
.pill.orange{background:#fdf1e6;color:var(--c-orange);}

/* chat */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 130px);}
.chat-log{flex:1;overflow-y:auto;padding:8px 2px;display:flex;flex-direction:column;gap:12px;}
.msg{max-width:84%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-break:break-word;}
.msg.ai{align-self:flex-start;background:var(--c-card);border:1px solid var(--c-line);border-bottom-left-radius:5px;box-shadow:var(--shadow-sm);}
.msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--c-primary),#5b86ff);color:#fff;border-bottom-right-radius:5px;box-shadow:0 4px 14px rgba(59,108,246,.25);}
.msg.ai .quick{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
.msg.ai .quick button{background:var(--c-primary-soft);color:var(--c-primary);font-size:12px;padding:6px 11px;border-radius:10px;font-weight:600;transition:transform .12s;}
.msg.ai .quick button:active{transform:scale(.95);}
.chat-input{display:flex;gap:9px;padding:12px 0 4px;align-items:center;}
.chat-input input{flex:1;border:1px solid var(--c-line);border-radius:14px;padding:12px 15px;background:var(--c-card);transition:border-color .2s,box-shadow .2s;}
.chat-input input:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-soft);}
.chat-input .send{width:46px;height:46px;border-radius:14px;background:var(--c-primary);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(59,108,246,.28);transition:transform .12s;}
.chat-input .send:active{transform:scale(.94);}
.chat-input .mic{width:46px;height:46px;border-radius:14px;background:var(--c-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--c-sub);}

/* form sheet */
.sheet-mask{position:fixed;inset:0;background:rgba(17,22,38,.42);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.sheet-mask.show{display:flex;}
.sheet{background:var(--c-card);border-radius:24px 24px 0 0;width:100%;max-width:560px;margin:0 auto;
  padding:20px 18px calc(22px + var(--safe-b));max-height:88vh;overflow-y:auto;animation:up .28s cubic-bezier(.22,1,.36,1);border-top:1px solid var(--c-line);}
@keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet h3{margin:0 0 16px;font-size:18px;font-weight:800;letter-spacing:-.02em;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--c-sub);margin-bottom:6px;font-weight:600;}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--c-line);border-radius:12px;padding:12px 13px;background:var(--c-bg);transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--c-primary);box-shadow:0 0 0 3px var(--c-primary-soft);background:#fff;}
.field textarea{min-height:84px;resize:vertical;}
.seg{display:flex;gap:7px;flex-wrap:wrap;}
.seg button{flex:1;min-width:54px;padding:10px 4px;border-radius:11px;background:var(--c-bg);color:var(--c-sub);font-size:13px;font-weight:700;transition:all .18s;}
.seg button.on{background:var(--c-primary);color:#fff;box-shadow:0 4px 12px rgba(59,108,246,.25);}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chips button{padding:8px 13px;border-radius:99px;background:var(--c-bg);color:var(--c-sub);font-size:13px;font-weight:600;transition:all .18s;border:1px solid transparent;}
.chips button.on{background:var(--c-primary-soft);color:var(--c-primary);font-weight:700;border-color:rgba(59,108,246,.25);}

/* misc */
.empty{text-align:center;color:var(--c-sub);padding:38px 10px;font-size:13px;}
.empty .big{font-size:36px;margin-bottom:10px;opacity:.8;}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.muted{color:var(--c-sub);}
.small{font-size:12px;}
.mt{margin-top:10px;} .mb{margin-bottom:10px;}
.center{text-align:center;}
.toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);background:rgba(26,33,56,.94);color:#fff;
  padding:11px 17px;border-radius:12px;font-size:13px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;max-width:82%;text-align:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.18);}
.toast.show{opacity:1;}
.switch{position:relative;width:44px;height:25px;background:var(--c-line);border-radius:99px;transition:background .2s;flex-shrink:0;}
.switch.on{background:var(--c-green);}
.switch::after{content:"";position:absolute;width:19px;height:19px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .22s cubic-bezier(.22,1,.36,1);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch.on::after{left:22px;}
.kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--c-line);font-size:13px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--c-sub);}
.hero{background:linear-gradient(135deg,var(--c-primary),#5b8bff);color:#fff;border-radius:var(--radius);padding:18px;margin-bottom:13px;box-shadow:0 8px 24px rgba(59,108,246,.25);position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.12);}
.hero .big{font-size:27px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.hero .lab{font-size:12px;opacity:.92;margin-top:2px;}
.module-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.module-grid .m{background:var(--c-card);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:5px;
  border:1px solid rgba(234,238,245,.6);transition:transform .2s ease,box-shadow .2s ease;}
@media(hover:hover){.module-grid .m:hover{transform:translateY(-3px);box-shadow:0 2px 4px rgba(17,24,40,.05),0 14px 32px rgba(17,24,40,.1);}}
.module-grid .m .ico{font-size:22px;width:42px;height:42px;border-radius:13px;background:var(--c-primary-soft);display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.module-grid .m .nm{font-weight:700;font-size:14px;letter-spacing:-.01em;}
.module-grid .m .ds{font-size:11px;color:var(--c-sub);}
.week-tabs{display:flex;gap:8px;margin-bottom:13px;}
.week-tabs button{flex:1;padding:9px;border-radius:12px;background:var(--c-card);color:var(--c-sub);font-size:13px;font-weight:700;box-shadow:var(--shadow-sm);transition:all .18s;}
.week-tabs button.on{background:var(--c-primary);color:#fff;box-shadow:0 4px 12px rgba(59,108,246,.25);}
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.badge{width:52px;height:52px;border-radius:15px;background:var(--c-bg);display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;flex-shrink:0;color:var(--c-sub);}
.badge.on{background:linear-gradient(135deg,#ffd66b,#ffb02e);color:#fff;box-shadow:0 4px 12px rgba(255,176,46,.3);}
.badge .lk{position:absolute;right:-2px;bottom:-2px;font-size:11px;}
.note{background:var(--c-primary-soft);color:#33509c;border-radius:12px;padding:11px;font-size:12px;margin-top:8px;line-height:1.6;border:1px solid rgba(59,108,246,.12);}
.divider{height:1px;background:var(--c-line);margin:13px 0;}
.hidden{display:none!important;}
.fade{animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="小助理" />
<link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand"><span class="sb-logo">🌟</span><span class="sb-name">小助理</span></div>
      <button class="sb-toggle" onclick="toggleSidebar()" aria-label="折叠侧栏">«</button>
    </div>
    <div class="sb-scroll">
      <div class="sb-sec">
        <div class="sb-item" onclick="go('home')" data-route="home"><span class="ico">🏠</span><span class="lab">首页</span></div>
      </div>
      <div class="sb-sec" id="sbModulesSec">
        <div class="sb-sec-head" onclick="toggleGroup(this)"><span>全部模块</span><span class="arr">▾</span></div>
        <div class="sb-group" id="sbModules"></div>
      </div>
      <div class="sb-sec" id="sbSupportSec">
        <div class="sb-sec-head" onclick="toggleGroup(this)"><span>公共支撑</span><span class="arr">▾</span></div>
        <div class="sb-group" id="sbSupport">
          <div class="sb-item" onclick="go('support/reminders')" data-route="support/reminders"><span class="ico">🔔</span><span class="lab">提醒中心</span></div>
          <div class="sb-item" onclick="go('support/export')" data-route="support/export"><span class="ico">📤</span><span class="lab">导出备份</span></div>
          <div class="sb-item" onclick="go('support/ach')" data-route="support/ach"><span class="ico">🏅</span><span class="lab">成就打卡</span></div>
          <div class="sb-item" onclick="go('support/settings')" data-route="support/settings"><span class="ico">⚙️</span><span class="lab">设置</span></div>
        </div>
      </div>
    </div>
    <div class="sb-foot">
      <div class="sb-item" onclick="go('mine')" data-route="mine"><span class="ico">👤</span><span class="lab">我的</span></div>
    </div>
  </aside>
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
  <main id="main">
    <header class="topbar"><button class="menu-btn" onclick="toggleSidebar()">☰</button><div class="topbar-title" id="topTitle">小助理</div></header>
    <div id="view"></div>
  </main>
</div>
<div id="sheet-root"></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
/* ============ 工具函数 U ============ */
const U = {
  uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); },
  today(){ const d=new Date(); return this.fmt(d); },
  fmt(d){ d=d||new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); },
  nowMin(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return p(d.getHours())+':'+p(d.getMinutes()); },
  weekday(d){ const n=new Date(d).getDay(); return ['日','一','二','三','四','五','六'][n]; },
  startOfWeek(){ const d=new Date(); const day=d.getDay()||7; d.setDate(d.getDate()-day+1); d.setHours(0,0,0,0); return d; },

/* ============ 状态层 Store（发布订阅 + 聚合） ============ */
const Store = {
  listeners:{},
  on(ev,fn){ (this.listeners[ev]=this.listeners[ev]||[]).push(fn); },
  emit(ev,arg){ (this.listeners[ev]||[]).forEach(fn=>fn(arg)); (this.listeners['*']||[]).forEach(fn=>fn(ev,arg)); DB.save(); },
  /* —— 聚合统计（供仪表盘/联动使用） —— */
  agg(){
    const d=DB.data, t=U.today();
    // 工作
    const wt=(d.work.tasks||[]).filter(x=>!x.done&&x.status!=='cancel');
    const urgent=wt.filter(x=>x.priority==='high');
    // 学习
    const st=(d.study.tasks||[]).filter(x=>x.date===t && !x.done);
    const studyMin=st.reduce((s,x)=>s+(x.estMin||0),0);
    // 饮食
    const diet=d.diet.byDate[t]||{meals:{}};
    const meals=diet.meals||{};
    let kcal=0,p=0,c=0,f=0;
    Object.values(meals).flat().forEach(f0=>{ kcal+=f0.kcal||0; p+=f0.protein||0; c+=f0.carb||0; f+=f0.fat||0; });
    // 减肥
    const w=d.weight.records||[]; const lastW=w[w.length-1];
    const prof=d.settings.profile;
    const tdee=calcTDEE(prof);
    const target=Math.round(tdee - (prof.reduceRate||0.5)*7700/7);
    const exToday=((d.weight.records||[]).filter(r=>r.date===t&&r.type==='exercise')).reduce((s,r)=>s+(r.kcal||0),0);
    const allowed=target+exToday; // 运动放宽额度
    const remain=Math.max(0, allowed - kcal);
    const gap=kcal - tdee - exToday; // 正=盈余 负=缺口
    // 存钱
    const sv=d.save.flows||[];
    const todayFlow=sv.filter(x=>x.date===t);
    const dayIn=todayFlow.filter(x=>x.type==='in').reduce((s,x)=>s+x.amount,0);
    const dayOut=todayFlow.filter(x=>x.type==='out').reduce((s,x)=>s+x.amount,0);
    const balance=sv.reduce((s,x)=>s+(x.type==='in'?x.amount:-x.amount),0);
    const goal=(d.save.goals||[])[0];
    let saveProg=null;
    if(goal){ const target=goal.amount; const start=goal.startAmount||0; const cur=balance-start;
      saveProg={ target, cur:Math.max(0,cur), pct:U.clamp(cur/(target-start||1)*100,0,100), deadline:goal.deadline }; }
    // 灵感/选题
    const ideas=(d.ideas.items||[]);
    const ideaTodo=ideas.filter(x=>x.status==='draft'||x.status==='todo').length;
    const hot=(d.hot.items||[]);
    const hotTodo=hot.filter(x=>!x.scriptDone).length;
    return {
      work:{ todo:wt.length, urgent:urgent.length, list:wt.slice(0,5) },
      study:{ todo:st.length, min:studyMin, list:st.slice(0,5) },
      diet:{ kcal:Math.round(kcal), protein:Math.round(p), carb:Math.round(c), fat:Math.round(f),
        target, remain:Math.round(remain), gap:Math.round(gap), logged:Object.keys(meals).length>0 },
      weight:{ last:lastW?lastW.weight:null, target:prof.targetWeight },
      save:{ dayIn, dayOut, balance:Math.round(balance), prog:saveProg },
      ideas:{ todo:ideaTodo, total:ideas.length },
      hot:{ todo:hotTodo, total:hot.length }
    };
  }
};
/* 基础热量计算（Mifflin-St Jeor） */
function calcTDEE(prof){
  if(!prof||!prof.height) return 1500;
  const bmr=10*(prof.weight||60)+6.25*(prof.height||162)-5*(prof.age||26)+(prof.sex==='男'?5:-161);
  return Math.round(bmr*1.375); // 轻活动
}

const UNIT_G = {'个':50,'只':50,'根':80,'条':100,'片':30,'块':40,'杯':240,'碗':200,'份':150,'把':60,'串':80,'瓶':500,'罐':330,'盒':250,'盘':300,'瓣':5,'颗':15,'只':50};
function foodLookup(q){
  q=q.trim();
  for(const name in FOODS){ if(q.includes(name)) return name;
    for(const a of (FOODS[name].al||[])) if(q.includes(a)) return name; }
  // 反向：别名/名称含查询
  for(const name in FOODS){ if(name.includes(q)) return name; }
  return null;
}
function parseQty(seg){
  // 返回 {num, unit, grams}
  let m=seg.match(/([0-9]+(?:\.[0-9]+)?)\s*(克|g|ml|毫升|个|只|根|条|片|块|杯|碗|份|把|串|瓶|罐|盒|盘|瓣|颗)/i);
  if(m){
    const num=parseFloat(m[1]); const u=m[2].toLowerCase();
    if(u==='克'||u==='g'||u==='ml'||u==='毫升') return {num,unit:'g',grams:num};
    const ug=UNIT_G[u]||50; return {num,unit:u,grams:num*ug};
  }
  if(/半/.test(seg)){ // 半根/半个
    const u=seg.match(/(个|只|根|条|片|块|杯|碗|份|把|串|瓶|罐|盒|盘)/);
    const ug=u?UNIT_G[u[1]]||50:50; return {num:0.5,unit:u?u[1]:'',grams:0.5*ug};
  }
  if(/两/.test(seg)){ const n=parseFloat(seg.match(/([0-9.]+)两/)[1])||1; return {num:n,unit:'两',grams:n*50}; }
  return {num:1,unit:'',grams:null}; // 无数量，后续按食物默认
}
function parseMeal(text){
  const segs=text.split(/[，,、；;和/与以及]+/).map(s=>s.trim()).filter(Boolean);
  const out=[];
  segs.forEach(seg=>{
    // 去掉“吃了/喝了对”等前缀词
    const clean=seg.replace(/^(我)?(吃了|喝了|吃|喝|来|要|想|加|记录|吃了个|吃了份)/,'').replace(/^(\d+|[一二三四五六七八九十半两])?(个|根|杯|碗|份|片|块|条|只|颗|枚|把|串|瓶|罐|盒|袋|勺|瓣)?/,'').replace(/^(的|了|一份|一个)/,'');
    const name=foodLookup(clean);
    if(!name){ out.push({name:clean,raw:seg,unknown:true,kcal:0,protein:0,carb:0,fat:0,grams:0}); return; }
    const f=FOODS[name]; const q=parseQty(clean);
    const grams=q.grams!=null?q.grams:(f.g||50);
    const factor=grams/100;
    out.push({ name, raw:seg, unknown:false, grams:Math.round(grams),
      kcal:Math.round(f.k*factor), protein:+(f.p*factor).toFixed(1),
      carb:+(f.c*factor).toFixed(1), fat:+(f.f*factor).toFixed(1) });
  });
  return out;

  /* 运动 MET 表 */
  MET:{ '慢跑':7,'跑步':8,'快走':4.3,'散步':2.5,'游泳':6,'骑行':6,'骑车':6,'力量':5,'撸铁':5,'瑜伽':2.5,'跳绳':10,'跳操':7,'hiit':8,'爬楼':8,'爬山':7,'羽毛球':6,'篮球':6.5,'健身':5 },
  exerciseKcal(name,min){
    const prof=DB.data.settings.profile; const w=prof.weight||60;
    let met=3.5; for(const k in this.MET){ if(name.includes(k)){ met=this.MET[k]; break; } }
    return Math.round(met*3.5*w/200*min);
  },
  /* 智能配餐推荐（核心） */
  recommendMeals(){
    const t=U.today(); const diet=DB.data.diet.byDate[t]||{meals:{}}; const meals=diet.meals||{};
    const prof=DB.data.settings.profile; const tdee=calcTDEE(prof);
    const deficit=Math.round((prof.reduceRate||0.5)*7700/7);
    const target=Math.round(tdee-deficit);
    let eaten=0; Object.values(meals).flat().forEach(f=>eaten+=f.kcal||0);
    const has=Object.keys(meals);
    const M={
      breakfast:{name:'早餐',ratio:.25,opts:[['水煮蛋','1个'],['无糖豆浆','1杯'],['燕麦','40g'],['全麦面包','1片'],['玉米','半根'],['苹果','1个']]},
      lunch:{name:'午餐',ratio:.4,opts:[['鸡胸肉','120g'],['糙米饭','150g'],['西兰花','100g'],['番茄','1个'],['豆腐','150g'],['清蒸鱼','120g']]},
      dinner:{name:'晚餐',ratio:.35,opts:[['虾仁','100g'],['红薯','150g'],['生菜','80g'],['鸡胸沙拉','250g'],['南瓜','150g'],['酸奶','200g']]}
    };
    if(has.length===0){
      const parts=Object.keys(M).map(k=>{ const m=M[k]; const kc=Math.round(target*m.ratio);
        return `${m.name}(约${kc}kcal)：${this._pick(m.opts,kc)}`; }).join('\n');
      return `今天还没记录饮食，目标摄入约 ${target}kcal（热量缺口 ${deficit}）。建议分配：\n${parts}`;
    }
    let remain=target-eaten;
    let need=[];
    if(!has.includes('breakfast')) need.push('breakfast');
    if(!has.includes('lunch')) need.push('lunch');
    if(!has.includes('dinner')&&!has.includes('breakfast')&&!has.includes('lunch')) need.push('dinner');
    else if(!has.includes('dinner')&&(has.includes('breakfast')||has.includes('lunch'))) need.push('dinner');
    if(need.length===0){
      return `今日已记录全部餐次，总摄入约 ${Math.round(eaten)}kcal，目标 ${target}kcal，剩余 ${Math.max(0,remain)}kcal。营养结构${this._evalNutri(t)}。`;
    }
    const each=Math.round(remain/need.length);
    const txt=need.map(k=>{ const m=M[k]; return `${m.name}建议约 ${each}kcal：${this._pick(m.opts,each)}`; }).join('\n');
    return `已摄入约 ${Math.round(eaten)}kcal，剩余可用 ${Math.max(0,remain)}kcal。推荐：\n${txt}`;
  },
  _pick(opts,kc){ // 选几样凑近 kc
    const fk=name=>{ const f=FOODS[name]; return f?f.k:100; };
    let sum=0,out=[]; for(const [n,q] of opts){ const k=fk(n)*this._g(q)/100; if(sum+kc<kc*0.9) break; if(sum+k<=kc*1.25){ out.push(n+q); sum+=k; if(sum>=kc*0.6) break; } }
    return out.length?out.join(' + '):opts[0][0]+opts[0][1];
  },
  _g(q){ const m=q.match(/([0-9]+)(g|个|杯|片|根|碗|份)?/); if(!m) return 50; if(m[2]==='g') return +m[1]; return UNIT_G[m[2]]||50; },
  _evalNutri(t){ const d=DB.data.diet.byDate[t]; if(!d) return '（暂无数据）'; let p=0,c=0,f=0; Object.values(d.meals||{}).flat().forEach(x=>{p+=x.protein||0;c+=x.carb||0;f+=x.fat||0;});
    if(p>f*1.5) return '均衡偏高蛋白，优秀 👍'; if(c>(p+f)) return '碳水偏高，可适当增加蛋白质'; return '基本均衡'; },
  /* 学习计划生成 */
  genStudyPlan(cat,hours){

    }[cat]||[['学习主题 1',''],['学习主题 2',''],['做笔记复盘','']];
    const perMin=Math.round(hours*60/base.length);
    const created=base.map((b,i)=>({id:U.uid(),cat,title:b[0],url:b[1]||bili(b[0]),estMin:perMin,date:t,done:false,auto:true}));
    DB.data.study.tasks.push(...created); Store.emit('study');
    return `已为你生成今日${cat}学习计划（约 ${hours} 小时，${created.length} 项），点击任务可直接跳转学习，停留达标自动打卡：\n`+
      created.map((c,i)=>`${i+1}. ${c.title}${c.url?'（含学习链接）':''}`).join('\n');
  },
  /* 存钱目标测算 */
  saveProjection(){
    const sv=DB.data.save.flows||[]; const goal=(DB.data.save.goals||[])[0];
    const balance=sv.reduce((s,x)=>s+(x.type==='in'?x.amount:-x.amount),0);
    if(!goal) return '尚未设置存钱目标，去「存钱计划」设置总目标后我再帮你测算。';
    const need=goal.amount-(balance-(goal.startAmount||0));
    if(need<=0) return `当前已超额达成目标 🎉 累计 ${U.money(balance)}。`;
    const monthsLeft=goal.deadline?Math.max(0,(new Date(goal.deadline)-new Date())/2592000000):null;
    const monthlyNeed=monthsLeft?need/monthsLeft:null;
    // 当前月存速
    const thisMonth=sv.filter(x=>x.date.startsWith(U.today().slice(0,7)));
    const monthNet=thisMonth.reduce((s,x)=>s+(x.type==='in'?x.amount:-x.amount),0);
    const daysPass=new Date().getDate(); const pace=monthNet/Math.max(1,daysPass)*30;
    let r=`目标 ${U.money(goal.amount)}，已存 ${U.money(balance-(goal.startAmount||0))}，还差 ${U.money(need)}。`;
    if(monthsLeft!=null) r+=`\n按截止 ${goal.deadline} 还需月存 ${U.money(monthlyNeed)}。`;
    r+=`\n当前月净存速度约 ${U.money(Math.round(pace))}/月，`;
    if(pace>0){ const eta=Math.ceil(need/pace); r+=`照此速度约 ${eta} 个月达成（${U.fmt(U.addDays(new Date(),eta*30))}）。`; }
    else r+='当前为净支出，需提高存速。';
    return r;
  },

const INVEST_TASKS=[];
INVEST_PLAN.forEach(s=>{(s.weeks||[]).forEach(wk=>{ wk.tasks.forEach(tt=>{ INVEST_TASKS.push({stage:s.stage,week:wk.w,title:tt.t,vid:tt.vid}); }); if(wk.quiz) INVEST_TASKS.push({stage:s.stage,week:wk.w,quiz:true,title:wk.quiz,vid:wk.title+' 复盘 自测'}); }); });
function genInvestToday(count){
  count=count||2;
  const sd=DB.data.study; const inv=sd.invest; if(!inv||!inv.enabled) return;
  const t=U.today();
  if(sd.tasks.some(x=>x.date===t&&x.plan==='invest')) return;
  const out=[];
  for(let i=0;i<count;i++){
    if(inv.idx < INVEST_TASKS.length){
      const it=INVEST_TASKS[inv.idx]; inv.idx++;
      out.push({id:U.uid(),cat:'投资',plan:'invest',stage:it.stage,week:it.week,quiz:!!it.quiz,title:it.title,url:bili(it.vid),estMin:40,date:t,done:false,auto:true});
    } else {
      const loop=INVEST_PLAN[3].loop; if(!loop.length) break;
      const lp=loop[inv.loopIdx % loop.length]; inv.loopIdx++;
      out.push({id:U.uid(),cat:'投资',plan:'invest',stage:4,loop:true,title:lp.t,url:bili(lp.vid),estMin:30,date:t,done:false,auto:true});
    }
  }
  sd.tasks.push(...out); DB.save();
}
function investStage(stage){
  const s=INVEST_PLAN.find(x=>x.stage===stage); if(!s) return;
  let body=`<div class="small" style="line-height:1.95">`;
  body+=`<div style="font-weight:700;margin-bottom:4px">核心目标</div>${U.escape(s.goal||'')}<br><br>`;
  if(s.weeks) s.weeks.forEach(wk=>{
    body+=`<div style="font-weight:700;margin:10px 0 4px">第${wk.w}周 · ${wk.title}</div>`;
    wk.tasks.forEach(tt=>{ body+=`• ${U.escape(tt.t)} <a href="${bili(tt.vid)}" target="_blank" style="color:#2b7de9">▶视频</a><br>`; });
    if(wk.quiz) body+=`✅ ${U.escape(wk.quiz)}<br>`;
  });
  if(s.loop) s.loop.forEach(lp=>{ body+=`• ${U.escape(lp.t)} <a href="${bili(lp.vid)}" target="_blank" style="color:#2b7de9">▶视频</a><br>`; });
  if(s.books){ body+=`<br><div style="font-weight:700">推荐书目</div>`; s.books.forEach(b=>{ body+=`• ${U.escape(b.name)} <a href="${b.url}" target="_blank" style="color:#2b7de9">▶看解读</a><br>`; }); }
  body+=`</div><div class="btn ghost mt" onclick="UI.closeSheet()">关闭</div>`;
  UI.openSheet('阶段'+stage+' · '+s.name, body);
}

function enablePlan(type){
  const sd=DB.data.study;
  if(type==='ielts'){ sd.ielts.enabled=true; ensureIeltsDaily(); DB.save(); toast('已开启雅思口语每日跟读'); go('m/study'); return; }
  if(type==='invest'){ if(!sd.invest) sd.invest={enabled:false,idx:0,loopIdx:0,dailyDate:''}; sd.invest.enabled=true; genInvestToday(2); DB.save(); toast('已开启理财四阶段学习'); go('m/study'); return; }
  if(type==='python'||type==='pmp'){
    if(!sd.roadmap[type]) sd.roadmap[type]={name:type==='python'?'Python 学习路线':'PMP 产品项目实践',nodes:seedRoadmap(type),idx:0};
    genRoadmapToday(type);
    DB.save(); toast('已生成'+(type==='python'?'Python':'PMP')+'学习路线'); go('m/study');
  }
}
function genRoadmapToday(type,count){
  count=count||3;
  const sd=DB.data.study; const rm=sd.roadmap[type]; if(!rm) return;
  const t=U.today();
  if(sd.tasks.some(x=>x.date===t&&x.plan===type)) return; // 今日已生成，保留打卡进度
  const out=[];
  for(let i=0;i<count;i++){ const node=rm.nodes[rm.idx % rm.nodes.length]; rm.idx++; out.push({id:U.uid(),cat:type==='python'?'技术':'投资',plan:type,title:node.t,url:node.url,estMin:node.min,date:t,done:false,auto:true}); }
  sd.tasks.push(...out);
}
function ensureStudyPlans(){
  const sd=DB.data.study;
  if(sd.ielts&&sd.ielts.enabled) ensureIeltsDaily();
  if(sd.roadmap.python) genRoadmapToday('python');
  if(sd.roadmap.pmp) genRoadmapToday('pmp');
  if(sd.invest&&sd.invest.enabled) genInvestToday(2);
}
function ensureIeltsDaily(){
  const sd=DB.data.study; const t=U.today();
  if(sd.ielts.dailyDate===t && sd.ielts.items.length) return;
  const n=IELT_BANK.length; const start=(parseInt(t.replace(/-/g,''),10)||0)%n;
  const items=[]; for(let i=0;i<100;i++){ const q=IELT_BANK[(start+i)%n]; items.push({id:U.uid(),q,url:baidu('雅思口语 '+q.slice(0,18)),done:false}); }
  sd.ielts.dailyDate=t; sd.ielts.items=items; DB.save();
}
function ensureHotDaily(){
  const h=DB.data.hot; const t=U.today();
  if(h.daily.date===t && h.daily.items.length) return;
  const n=DOUYIN_BANK.length; const start=(parseInt(t.replace(/-/g,''),10)||0)%n;
  const items=[]; for(let i=0;i<Math.min(8,n);i++){ const b=DOUYIN_BANK[(start+i)%n]; items.push({id:U.uid(),title:b.t,heat:b.heat,follow:b.follow,remake:b.remake,url:'https://www.douyin.com/search/'+encodeURIComponent(b.t),done:false}); }
  h.daily.date=t; h.daily.items=items; DB.save();
}
function ensureDailyContent(){ ensureStudyPlans(); ensureHotDaily(); }

const AI = {
  ctx:{ lastMealSeg:null },
  async handle(raw){
    let text=raw.trim(); if(!text) return {reply:'说点什么吧～'};
    const low=text.toLowerCase();
    const R={reply:'',html:'',goto:null,quick:[]};
    // —— 饮食录入 ——
    let m;
    // 配餐推荐（优先于录餐，避免把「推荐晚餐」当成食物）
    if(/推荐/.test(text) && /(晚餐|午饭|午餐|早餐|餐|吃)/.test(text)){ R.reply=AIcompute.recommendMeals(); R.goto='m/diet'; return R; }
    if(m=text.match(/(早午餐|早晚饭).{0,4}(吃了|喝了|吃|喝)?(.+)/)){ return this._logMeal('lunch',m[3],'午餐(早午餐)'); }
    if(m=text.match(/(早餐|早饭|早|上午).{0,3}(吃了|喝了|吃|喝|来|记录|加)?(.+)/)){ return this._logMeal('breakfast',m[3],'早餐'); }
    if(m=text.match(/(午餐|午饭|午|中午).{0,3}(吃了|喝了|吃|喝|来|记录|加)?(.+)/)){ return this._logMeal('lunch',m[3],'午餐'); }
    if(m=text.match(/(晚餐|晚饭|晚|晚上).{0,3}(吃了|喝了|吃|喝|来|记录|加)?(.+)/)){ return this._logMeal('dinner',m[3],'晚餐'); }
    if(m=text.match(/(加餐|宵夜|夜宵).{0,3}(吃了|喝了|吃|喝|来|记录|加)?(.+)/)){ return this._logMeal('snack',m[3],'加餐'); }
    if(m=text.match(/(喝了|吃了|吃|喝).{0,3}(.+)/) && !/(任务|体重|收入|支出)/.test(text)){ return this._logMeal('breakfast',m[2],'餐次'); }
    // 删除食物
    if(/删除|去掉|删掉/.test(text) && /(记录|奶茶|吃的|刚才|刚刚|食物)/.test(text)){
      const name=text.replace(/.*(删除|去掉|删掉).{0,4}/,'').replace(/记录|刚才|刚刚|吃的|食物|的/g,'');
      return this._delFood(name);
    }
    // —— 体重 ——
    if(m=text.match(/记录?体重[：:]?\s*([0-9.]+)\s*(kg|公斤|千克)?/)){ return this._logWeight(parseFloat(m[1])); }
    if(/记体重|测体重|称体重/.test(text)){ R.reply='请告诉我今天的体重，例如「记录体重 62.5kg」。'; R.goto='m/weight'; return R; }
    // —— 运动 ——
    if(m=text.match(/记录?(.{1,6}?)\s*(\d+)\s*(分钟|min|小时|h)/i)){ return this._logExercise(m[1],parseInt(m[2]),/小时|h/i.test(m[3])?60:1); }
    // —— 存钱 ——
    if(m=text.match(/记录?副业收入\s*([0-9]+)/)){ return this._logFlow('in','副业收入',+m[1],'副业'); }
    if(m=text.match(/记录?主业收入\s*([0-9]+)/)){ return this._logFlow('in','主业收入',+m[1],'主业'); }
    if(m=text.match(/记录?理财收益\s*([0-9]+)/)){ return this._logFlow('in','理财收益',+m[1],'理财'); }
    if(m=text.match(/记录?(收入|工资|入账)\s*([0-9]+)/)){ return this._logFlow('in','主业收入',+m[2],'主业'); }
    if(m=text.match(/记录?(支出|花了|消费|买|开销)\s*([0-9]+)/)){ return this._logFlow('out','弹性消费',+m[2],'弹性'); }
    if(/存款目标|存钱目标|还需要多久|还要多久|达成目标/.test(text)){ R.reply=AIcompute.saveProjection(); R.goto='m/save'; return R; }
    // —— 工作计划 ——
    if(m=text.match(/新建?任务[：:]?\s*(.+)/)){ return this._newTask(m[1]); }
    if(/今天.{0,3}待办|待办.{0,3}今天|查看待办|我的待办/.test(text)){ R.reply=this._listTodo(); R.goto='m/work'; return R; }
    // —— 学习计划 ——
    if(!/python|pmp|雅思|跟读|口语|投资|理财|基金|定投/i.test(text) && (m=text.match(/制定.{0,12}学习?计划(.{0,6})(英语|技术|投资|理财)?/))){ const h=m[1].match(/([0-9.]+)\s*小时/); const cat=m[2]||'英语'; return this._genStudy(cat,h?parseFloat(h[1]):1); }
    if(m=text.match(/标记.{0,12}(英语|技术|投资|理财)?学习(任务)?完成/)){ return this._doneStudy(m[1]||'英语'); }
    // —— 灵感 ——
    if(m=text.match(/保存?灵感[：:]?\s*(.+)/)){ return this._saveIdea(m[1]); }
    if(m=text.match(/记灵感[：:]?\s*(.+)/)){ return this._saveIdea(m[1]); }
    // —— 热点 ——
    if(/解析.{0,6}视频|二创思路|爆款拆解/.test(text)){ R.reply=AIcompute.hotspotBreakdown(text); R.goto='m/hot'; R.quick=['保存为二创项目']; return R; }
    // —— 预置学习计划 ——

/* ============ UI 框架：路由 / 导航 / 表单弹层 ============ */
const UI = {
  view(){ return U.$('#view'); },
  mount(html){ this.view().innerHTML=html; this.view().classList.remove('fade'); void this.view().offsetWidth; this.view().classList.add('fade'); },
  /* 通用表单弹层 */
  openForm(title, fields, onSubmit, opts){
    opts=opts||{};
    const body=fields.map(f=>{
      let c='';
      if(f.type==='select'){ c=`<select data-k="${f.key}">${(f.options||[]).map(o=>`<option ${o===f.value?'selected':''}>${o}</option>`).join('')}</select>`; }
      else if(f.type==='textarea'){ c=`<textarea data-k="${f.key}" placeholder="${f.placeholder||''}">${f.value||''}</textarea>`; }
      else if(f.type==='seg'){ c=`<div class="seg" data-k="${f.key}" data-seg>${f.options.map(o=>`<button class="${o===f.value?'on':''}" data-v="${o}">${o}</button>`).join('')}</div>`; }
      else if(f.type==='chips'){ c=`<div class="chips" data-k="${f.key}" data-multi>${f.options.map(o=>`<button class="${(f.value||[]).includes(o)?'on':''}" data-v="${o}">${o}</button>`).join('')}</div>`; }
      else { c=`<input data-k="${f.key}" type="${f.type||'text'}" value="${f.value||''}" placeholder="${f.placeholder||''}"/>`; }
      return `<div class="field"><label>${f.label}</label>${c}</div>`;
    }).join('') + `<div class="btn-row mt"><button class="btn ghost" data-cancel>取消</button><button class="btn" data-ok>保存</button></div>`;
    this.openSheet(title, body, ()=>{
      const vals={};
      fields.forEach(f=>{
        if(f.type==='seg'){ const el=U.$(`[data-seg][data-k="${f.key}"] .on`); vals[f.key]=el?el.dataset.v:f.value; }
        else if(f.type==='chips'){ vals[f.key]=U.$$(`[data-multi][data-k="${f.key}"] .on`).map(b=>b.dataset.v); }
        else { const el=U.$(`[data-k="${f.key}"]`); vals[f.key]=el?el.value:''; }
      });
      onSubmit(vals);
    }, opts);
  },
  openSheet(title, body, onOk, opts){
    opts=opts||{};
    const root=U.$('#sheet-root');
    root.innerHTML=`<div class="sheet-mask"><div class="sheet"><h3>${title}</h3>${body}</div></div>`;
    const mask=U.$('.sheet-mask',root); mask.classList.add('show');
    const segBtns=U.$$('[data-seg] button',root); segBtns.forEach(b=>b.onclick=()=>{ U.$$('button',b.parentElement).forEach(x=>x.classList.remove('on')); b.classList.add('on'); });
    const chipBtns=U.$$('[data-multi] button',root); chipBtns.forEach(b=>b.onclick=()=>b.classList.toggle('on'));
    const ok=U.$('[data-ok]',root); if(ok) ok.onclick=()=>{ onOk&&onOk(); this.closeSheet(); };
    const cancel=U.$('[data-cancel]',root); if(cancel) cancel.onclick=()=>this.closeSheet();
    mask.onclick=e=>{ if(e.target===mask) this.closeSheet(); };
  },
  closeSheet(){ const m=U.$('.sheet-mask'); if(m) m.classList.remove('show'); },
  confirm(msg, cb){ if(confirm(msg)) cb(); }
};

function weekBoard(){
  const start=U.startOfWeek(); const days=[]; for(let i=0;i<7;i++) days.push(U.fmt(U.addDays(start,i)));
  const t=DB.data;
  const workDone=days.reduce((s,d)=>s+t.work.tasks.filter(x=>x.done&&x.doneDate===d).length,0);
  const workAll=days.reduce((s,d)=>s+t.work.tasks.filter(x=>x.created===d||x.doneDate===d).length,0);
  const studyMin=days.reduce((s,d)=>s+t.study.tasks.filter(x=>x.date===d&&x.done).reduce((a,x)=>a+(x.estMin||0),0),0);
  const studyDays=new Set(t.study.tasks.filter(x=>x.done).map(x=>x.date)).size;
  const ws=t.weight.records.filter(r=>!r.type).sort((a,b)=>a.date<b?-1:1);
  const w0=ws.find(r=>r.date>=days[0]); const w1=ws[ws.length-1];
  const netSave=days.reduce((s,d)=>s+t.save.flows.filter(x=>x.date===d).reduce((a,x)=>a+(x.type==='in'?x.amount:-x.amount),0),0);
  const creations=t.ideas.items.filter(x=>x.status==='made'&&x.created>=days[0]).length + t.hot.items.filter(x=>x.scriptDone&&x.created>=days[0]).length;
  return `<div class="card"><div class="card-h"><span class="t"><i class="dot"></i>本周综合</span></div>
    <div class="kv"><span class="k">工作完成</span><span>${workDone}/${workAll} 项</span></div>
    <div class="kv"><span class="k">学习时长 / 打卡</span><span>${studyMin} 分 / ${studyDays} 天</span></div>
    <div class="kv"><span class="k">体重变化</span><span>${w0&&w1?w0.weight+' → '+w1.weight+'kg ('+(w1.weight-w0.weight>=0?'+':'')+(w1.weight-w0.weight).toFixed(1)+')':'—'}</span></div>
    <div class="kv"><span class="k">本周净存入</span><span>${U.money(netSave)}</span></div>
    <div class="kv"><span class="k">本周产出</span><span>${creations} 个选题/成片</span></div>
  </div>`;
}

}

function renderStudy(){
  const sd=DB.data.study; const t=U.today();
  const custom=(sd.custom||[]).map(c=>c.name);
  const mods=['技术','投资','英语',...custom];
  const mod=window._studyMod||'技术';
  const tabs=`<div class="week-tabs">${mods.map(m=>`<button class="${m===mod?'on':''}" onclick="window._studyMod='${U.escape(m)}';renderStudy()">${U.escape(m)}</button>`).join('')}<button class="add" onclick="addStudyModule()" title="新建学习模块">＋</button></div>`;
  let body='';
  if(mod==='技术') body=studyTech(sd,t);
  else if(mod==='投资') body=studyInvest(sd,t);
  else if(mod==='英语') body=studyEnglish(sd,t);
  else body=studyCustom(mod,sd,t);
  UI.mount(`<div class="page-head"><h1>学习计划</h1><span class="sub">按模块排课</span></div>${tabs}${body}`);
}
function taskLi(x){
  return `<div class="li">
    <span style="font-size:20px;cursor:pointer" onclick="toggleStudy('${x.id}')">${x.done?'✅':'⬜'}</span>
    <span class="main" onclick="toggleStudy('${x.id}')"><div class="title" style="${x.done?'text-decoration:line-through;color:var(--c-sub)':''}">${x.stage?('S'+x.stage+'·'+(x.loop?'实战循环':(x.quiz?'自测':'第'+x.week+'周'))+' '):''}${U.escape(x.title)}</div><div class="desc">${x.estMin}分 ${x.url?`<a href="${x.url}" target="_blank" onclick="event.stopPropagation()">▶ 看视频</a>`:''} ${x.auto?'· 自动':''}</div></span>
    <button class="icon-btn" style="width:30px;height:30px;font-size:15px" onclick="editStudyTask('${x.id}')">✎</button>
    <button class="icon-btn" style="width:30px;height:30px;font-size:15px" onclick="delStudyTask('${x.id}')">✕</button>

function delStudyTask(id){ if(!confirm('删除这条学习任务？')) return; DB.data.study.tasks=DB.data.study.tasks.filter(x=>x.id!==id); Store.emit('study'); toast('已删除'); renderStudy(); }
function editStudyTask(id){ const x=DB.data.study.tasks.find(t=>t.id===id); if(!x) return; UI.openForm('编辑学习任务',[{key:'title',label:'学习内容',type:'text',value:x.title},{key:'est',label:'预估时长(分)',type:'number',value:x.estMin},{key:'url',label:'学习视频链接',type:'text',value:x.url||''},{key:'date',label:'日期',type:'date',value:x.date}],v=>{ x.title=v.title; x.estMin=+v.est||30; x.url=v.url||''; x.date=v.date||U.today(); DB.save(); toast('已更新'); renderStudy(); }); }
function studyTech(sd,t){
  const rmP=sd.roadmap.python, rmM=sd.roadmap.pmp;
  const tTasks=sd.tasks.filter(x=>x.date===t&&x.cat==='技术');
  let h='';
  h+=`<div class="card"><div class="card-h"><span class="t"><i class="dot"></i>🐍 Python 学习路线</span><span class="more" onclick="${rmP?'roadmapSheet(\'python\')':'enablePlan(\'python\')'}">${rmP?('进度 '+rmP.idx+'/'+rmP.nodes.length+' ›'):'启用 ›'}</span></div>`;
  if(rmP){ const tp=tTasks.filter(x=>x.plan==='python'); h+=`<div class="list">${tp.map(x=>taskLi(x)).join('')||'<div class="empty">今日无自动任务，点下方生成</div>'}</div>`; }
  else h+='<div class="small muted" style="padding:2px 0">基础→爬虫→数据分析→Web→实战，每条附视频</div>';
  h+='</div>';
  h+=`<div class="card mt"><div class="card-h"><span class="t"><i class="dot"></i>📦 PMP 产品项目实践</span><span class="more" onclick="${rmM?'roadmapSheet(\'pmp\')':'enablePlan(\'pmp\')'}">${rmM?('进度 '+rmM.idx+'/'+rmM.nodes.length+' ›'):'启用 ›'}</span></div>`;
  if(rmM){ const tm=tTasks.filter(x=>x.plan==='pmp'); h+=`<div class="list">${tm.map(x=>taskLi(x)).join('')||'<div class="empty">今日无自动任务</div>'}</div>`; }
  else h+='<div class="small muted" style="padding:2px 0">竞品/PRD/调研/数据/复盘，每条附视频</div>';
  h+='</div>';
  const gen=tTasks.filter(x=>!x.plan);
  h+=`<div class="card mt"><div class="card-h"><span class="t"><i class="dot"></i>技术 · 今日清单</span><span class="more">${gen.filter(x=>x.done).length}/${gen.length}</span></div>${gen.length?`<div class="list">${gen.map(x=>taskLi(x)).join('')}</div>`:'<div class="empty">暂无，用对话或下方生成</div>'}</div>`;
  h+=`<div class="btn-row"><button class="btn ghost" onclick="genPlan()">🤖 生成今日计划</button><button class="btn ghost" onclick="go('chat')">对话排课</button></div>`;
  h+=`<div class="card mt"><div class="card-h"><span class="t"><i class="dot"></i>技术专属台账</span></div>${studyExtra('技术')}</div>`;
  return h;
}
function studyInvest(sd,t){

    h+=investBooks(curStage);
    h+=`<div class="btn ghost mt" onclick="if(confirm('关闭理财四阶段学习？已生成任务将保留。')){DB.data.study.invest.enabled=false;DB.save();renderStudy();}">关闭此计划</div>`;

  h+=`<div class="btn-row"><button class="btn ghost" onclick="genPlan()">🤖 生成今日计划</button><button class="btn ghost" onclick="addStudyTask('投资')">➕ 加任务</button><button class="btn ghost" onclick="go('chat')">对话排课</button></div>`;
  h+=`<div class="card mt"><div class="card-h"><span class="t"><i class="dot"></i>投资专属台账</span></div>${studyExtra('投资')}</div>`;
  h+=`<div class="card mt" style="border-left:3px solid #e08600"><div class="card-h" style="cursor:pointer" onclick="go('m/market')"><span class="t"><i class="dot" style="background:#e08600"></i>📊 理财趋势观察</span><span class="more">进入 ›</span></div>
    <div class="small muted" style="line-height:1.6">把学到的理财知识用于实战观察：录入每日财经资讯，AI 自动判断利好/利空、生成板块策略，训练你的市场分析思路（联动「存钱计划」做资金分配）。</div></div>`;

function studyCustom(name,sd,t){
  const list=sd.tasks.filter(x=>x.date===t&&x.cat===name);
  let h=`<div class="card"><div class="card-h"><span class="t"><i class="dot"></i>${U.escape(name)} · 今日清单</span><span class="more">${list.filter(x=>x.done).length}/${list.length}</span></div>
    ${list.length?`<div class="list">${list.map(x=>taskLi(x)).join('')}</div>`:'<div class="empty">今日还没有任务</div>'}</div>`;
  h+=`<div class="btn-row"><button class="btn ghost" onclick="genCustomToday('${U.escape(name)}')">🤖 生成今日计划</button><button class="btn ghost" onclick="addStudyTask('${U.escape(name)}')">➕ 加任务</button><button class="btn ghost" onclick="delStudyModule('${U.escape(name)}')">🗑 删模块</button></div>`;
  h+=`<div class="card mt"><div class="card-h"><span class="t"><i class="dot"></i>${U.escape(name)}台账</span></div>${studyExtra(name)}</div>`;

function addStudyTask(cat){
  UI.openForm('新增学习任务 · '+cat,[{key:'title',label:'学习内容',type:'text'},{key:'est',label:'预估时长(分)',type:'number',value:30},{key:'url',label:'学习视频链接(可选)',type:'text'},{key:'date',label:'日期',type:'date',value:U.today()}],v=>{
    DB.data.study.tasks.push({id:U.uid(),cat:cat,title:v.title,url:v.url||'',estMin:+v.est||30,date:v.date||U.today(),done:false,auto:false});
    Store.emit('study'); toast('已添加'); go('m/study');
  });
}
function genCustomToday(name){
  const sd=DB.data.study; const t=U.today();
  const cm=(sd.custom||[]).find(c=>c.name===name); const hours=cm?cm.hours:1;
  const perMin=Math.max(15,Math.round(hours*60/3));
  const base=['复习上节重点内容','学习一节新内容（配视频/资料）','做配套练习或自测'];
  const out=base.map(b=>({id:U.uid(),cat:name,title:name+'：'+b,url:'',estMin:perMin,date:t,done:false,auto:true}));
  sd.tasks.push(...out); DB.save(); toast('已生成今日计划'); renderStudy();
}
function addStudyModule(){
  UI.openForm('新建学习模块',[{key:'name',label:'模块名称(如：考研/法律/设计)',type:'text'},{key:'hours',label:'每日计划时长(小时)',type:'number',value:1}],v=>{
    const name=(v.name||'').trim(); if(!name) return;
    const sd=DB.data.study; sd.custom=sd.custom||[];
    if(sd.custom.some(c=>c.name===name)){ toast('已存在该模块'); window._studyMod=name; renderStudy(); return; }
    sd.custom.push({id:U.uid(),name:name,hours:Math.max(0.5,parseFloat(v.hours)||1)});
    DB.save(); window._studyMod=name; toast('已新建模块：'+name); renderStudy();
  });
}
function delStudyModule(name){
  if(!confirm('确定删除模块「'+name+'」？其下所有任务也会一并删除。')) return;
  const sd=DB.data.study; sd.custom=(sd.custom||[]).filter(c=>c.name!==name);
  sd.tasks=sd.tasks.filter(x=>x.cat!==name); DB.save(); window._studyMod='技术'; renderStudy(); toast('已删除模块');
}
function studyExtra(cat){
  const notes=DB.data.study[cat]||[];
  return `<div class="small muted">${cat==='技术'?'技术方向 / 项目实践 / 待攻克知识点':cat==='投资'?'读书笔记 / 市场观察 / 模拟投资思考':'词汇量 / 听力阅读口语练习台账'}（可在「我的→设置」或对话补充）</div>
    <textarea class="mt" style="width:100%;border:1px solid var(--c-line);border-radius:10px;padding:10px;background:var(--c-bg);min-height:70px" placeholder="随手记一条${cat}笔记…" onblur="saveStudyNote('${cat}',this.value)">${notes.join('\n')}</textarea>`;
}
function saveStudyNote(cat,v){ DB.data.study[cat]=v.split('\n').filter(Boolean); DB.save(); }
function toggleStudy(id){ const t=DB.data.study.tasks.find(x=>x.id===id); if(t){ t.done=!t.done; if(t.done)t.doneDate=U.today(); Store.emit('study'); renderStudy(); } }
function genPlan(){ const mod=window._studyMod||'技术'; const sd=DB.data.study; if((sd.custom||[]).some(c=>c.name===mod)){ genCustomToday(mod); return; } const h=prompt('每日学习时长（小时）？','1'); if(h==null) return; AI.handle('制定每日'+h+'小时'+mod+'学习计划'); toast('已生成'); go('m/study'); }

function renderWork(){
  const tasks=DB.data.work.tasks.slice().sort((a,b)=>(a.priority==='高'?0:a.priority==='中'?1:2)-(b.priority==='高'?0:b.priority==='中'?1:2));
  const tag={todo:'gray',doing:'blue',done:'green',overdue:'red',cancel:'gray'};
  UI.mount(`<div class="page-head"><h1>工作计划</h1><span class="sub">四象限 / 复盘</span></div>
    <div class="btn ghost mb" onclick="addTask()">➕ 新建任务</div>
    ${tasks.length?`<div class="list">${tasks.map(t=>`<div class="li" onclick="taskDetail('${t.id}')"><span class="main"><div class="title">${t.title}</div><div class="desc">${t.project||''} ${t.deadline?'· 截止'+t.deadline:''} · ${t.est}分</div></span><span class="pill ${tag[t.status]||'gray'}">${({todo:'待进行',doing:'进行中',done:'已完成',overdue:'超时',cancel:'取消'})[t.status]}</span><button class="icon-btn" style="width:30px;height:30px;font-size:15px" onclick="event.stopPropagation();delTask('${t.id}')">✕</button></div>`).join('')}</div>`:'<div class="empty"><div class="big">📋</div>还没有任务，点上方「新建任务」或在对话中说「新建任务：脚本初稿截止本周三」</div>'}`);
}
function addTask(){ UI.openForm('新建任务',[{key:'title',label:'任务名称',type:'text'},{key:'desc',label:'描述',type:'textarea'},{key:'est',label:'预估耗时(分)',type:'number',value:30},{key:'deadline',label:'截止时间',type:'date'},{key:'priority',label:'优先级',type:'seg',options:['高','中','低'],value:'中'},{key:'project',label:'项目分组',type:'text'},{key:'repeat',label:'周期',type:'select',options:['none','每日','每周','自定义'],value:'none'}],v=>{ DB.data.work.tasks.push({id:U.uid(),title:v.title,desc:v.desc,est:+v.est||30,deadline:v.deadline,priority:v.priority,status:'todo',project:v.project,repeat:v.repeat,tags:[],done:false,created:U.today()}); Store.emit('work'); toast('已添加'); go('m/work'); }); }
function taskDetail(id){ const t=DB.data.work.tasks.find(x=>x.id===id); if(!t) return; UI.openForm('任务详情：'+t.title,[{key:'status',label:'状态',type:'select',options:['todo','doing','done','overdue','cancel'],value:t.status},{key:'delay',label:'延迟/复盘原因',type:'textarea',value:t.delay||''}],v=>{ t.status=v.status; t.done=v.status==='done'; if(t.done)t.doneDate=U.today(); t.delay=v.delay; Store.emit('work'); toast('已更新'); go('m/work'); }); }
function delTask(id){ if(!confirm('删除这条任务？')) return; DB.data.work.tasks=DB.data.work.tasks.filter(x=>x.id!==id); Store.emit('work'); toast('已删除'); go('m/work'); }

const MarketAI = {

  LONG:['国家级','长期','战略','变革','产业升级','五年','十年','长效机制','长期规划'],
  detect(map,txt){ let out=[]; for(const k in map){ if(map[k].some(w=>txt.toLowerCase().includes(w.toLowerCase()))) out.push(k); } return out; },
  newItem(title,content){
    return {id:U.uid(), create_time:Date.now(), update_time:Date.now(), delete_status:false, remark:'',
      news_title:title||'', news_content:content||'', source_url:'', source_name:'', publish_date:U.today(),
      category_type:'industry', target_sectors:[], importance_level:'normal', sentiment_tag:'neutral', duration_type:'mid', authenticity:'media',
      ai_summary:'', ai_strategy_content:'', is_collect:false, user_self_note:'', logic_verify_result:'uncheck'};
  },
  authenticityOf(it){
    const t=(it.news_title||'')+' '+(it.news_content||''); const src=it.source_name||'';
    if(this.RUMOR.some(w=>t.includes(w))) return 'rumor';
    if(/(国务院|央行|工信部|证监会|发改委|国资委|统计局|gov\.cn|新华社)/.test(src+t)) return 'official';
    return 'media';
  },
  analyze(it){
    const txt=(it.news_title||'')+' '+(it.news_content||'');
    const autoCat = (this.ASSETS.some(w=>txt.includes(w)) && !this.detect(this.SECTORS,txt).length) ? 'asset'

    if(it.category_type==='industry' && autoCat!=='industry') it.category_type=autoCat;
    let sec=this.detect(this.SECTORS,txt);
    if(it.target_sectors && it.target_sectors.length) sec=Array.from(new Set(it.target_sectors.concat(sec)));

    const bull=this.BULL.filter(w=>txt.includes(w)).length, bear=this.BEAR.filter(w=>txt.includes(w)).length;
    if(bear>bull) it.sentiment_tag='bear'; else if(bull>bear) it.sentiment_tag='bull'; else it.sentiment_tag='neutral';

    else if(this.HEAVY.some(w=>txt.includes(w))) it.importance_level='heavy';

      risk='高位利好兑现（消息出尽见光死）、政策细则/落地力度不及预期、板块短期拥挤交易。';

    } else if(it.sentiment_tag==='bear'){
      opp='短期规避「'+sec+'」情绪释放，等待风险出清；关注错杀后、逻辑未被破坏的优质标的左侧机会。';
      risk='利空持续发酵、业绩下修、估值继续压缩；若持仓需评估是否减仓或对冲。';

function genWeeklyReport(){
  const d=DB.data.market; const items=d.items.filter(x=>!x.delete_status);
  const now=new Date(); const dow=(now.getDay()+6)%7; const ws=new Date(now); ws.setDate(now.getDate()-dow); const we=new Date(ws); we.setDate(ws.getDate()+6);
  const wsStr=ymd(ws), weStr=ymd(we);
  const week=items.filter(x=>x.publish_date>=wsStr && x.publish_date<=weStr);
  const map={};
  week.forEach(x=>{ (x.target_sectors.length?x.target_sectors:['其他']).forEach(s=>{ map[s]=map[s]||{total:0,bull:0,bear:0,neutral:0,items:[]}; map[s].total++; map[s][x.sentiment_tag]++; map[s].items.push(x.news_title); }); });
  const sector_analysis=Object.keys(map).map(s=>({sector:s, total:map[s].total, bull:map[s].bull, bear:map[s].bear, neutral:map[s].neutral, items:map[s].items, view:(map[s].bull>map[s].bear?'本周偏利好，关注持续性':map[s].bear>map[s].bull?'本周偏利空，注意风险':'本周多空均衡，以跟踪为主')}));
  const bull=week.filter(x=>x.sentiment_tag==='bull').length, bear=week.filter(x=>x.sentiment_tag==='bear').length, neutral=week.filter(x=>x.sentiment_tag==='neutral').length;
  const overall=`本周共收录 ${week.length} 条资讯（利好 ${bull} / 利空 ${bear} / 中性 ${neutral}）。${bull>bear?'整体情绪偏暖，可关注产业催化方向的逢调布局':bear>bull?'整体情绪偏谨慎，控制仓位、重视风险':'多空交织，建议以定投与观察为主'}。所有结论仅作学习参考，不构成投资建议。`;
  return {id:U.uid(), week_start:wsStr, week_end:weStr, sector_analysis_list:sector_analysis, overall_market_view:overall, summary_preview:`本周（${wsStr}~${weStr}）收录 ${week.length} 条 · 覆盖 ${sector_analysis.length} 个板块`, save_time:Date.now()};

function marketAdvice(d){
  const follow=(d.follow&&d.follow.length)?d.follow:Object.keys(MarketAI.SECTORS);
  const items=d.items.filter(x=>!x.delete_status);
  const cards=follow.map(sec=>{
    const arr=items.filter(x=>(x.target_sectors||[]).includes(sec));
    const bull=arr.filter(x=>x.sentiment_tag==='bull').length, bear=arr.filter(x=>x.sentiment_tag==='bear').length, neu=arr.filter(x=>x.sentiment_tag==='neutral').length;
    let advice;
    if(!arr.length) advice='近期暂无该板块资讯，可保持关注政策与龙头动向，等待催化。';
    else if(bull>bear) advice='近期催化偏多，可逢回调分批关注、用定投平滑成本；切忌在情绪最热时追高，重点验证后续订单/政策细则/财报是否兑现。';
    else if(bear>bull) advice='短期承压，控制仓位、规避情绪主跌段，等待风险出清后评估错杀机会；警惕高位利好兑现与业绩下修。';
    else advice='多空交织，以定投与观察为主，重视后续数据方向选择，不押单边。';
    const last=arr.slice().reverse()[0];
    const tone=bull>bear?'利好偏多':bear>bull?'利空偏多':'多空均衡';
    const toneColor=bull>bear?'#2a9d4a':bear>bull?'#d33':'#e08a00';
    return `<div class="card mt" style="border-left:3px solid ${toneColor}"><div class="card-h"><span class="t"><i class="dot" style="background:${toneColor}"></i>${sec}</span><span class="more" style="background:#f4f4f4;color:${toneColor};padding:2px 8px;border-radius:6px;font-size:11px">${tone}</span></div>
      <div class="small muted" style="margin-bottom:6px">资讯 ${arr.length} 条 ｜ 利好 ${bull} / 利空 ${bear} / 中性 ${neu}</div>
      <div class="small" style="line-height:1.6;white-space:pre-wrap">${advice}</div>

    </div>`;
  }).join('');
  return `<div class="small muted" style="margin-bottom:8px">以下为「关注板块」的近期建议汇总（在「⚙ 选择板块」中可增删）。所有结论仅作学习参考：</div>${cards||'<div class="empty">还没有关注板块</div>'}`;

function marketFetchNet(silent){
  // 智能 fallback：优先用 settings.marketApi；若未配但已配选题端点(BASE/api/topics)，自动复用 BASE/api/market-news
  let ep=DB.data.settings.marketApi;
  if(!ep){
    const netEp=DB.data.settings.net.endpoint||'';
    const m=netEp.match(/^(https?:\/\/[^/]+)/);
    if(m) ep=m[1]+'/api/market-news';
    else if(window.location.protocol.indexOf('http')===0) ep='/api/market-news';
  }
  if(!ep){ if(!silent) toast('请到「设置→理财趋势资讯端点」配置 /api/market-news（如已填选题端点会自动复用）。'); return; }
  if(!silent) toast('正在联网检索最新资讯…');
  fetch(ep+(ep.indexOf('?')>=0?'&':'?')+'date='+encodeURIComponent(U.today()))
    .then(r=>r.json())
    .then(j=>{
      let arr=Array.isArray(j)?j:(j.items||j.news||[]);
      if(!arr||!arr.length){ if(!silent) toast('未获取到新资讯，保持现有数据'); return; }
      let added=0;
      arr.forEach(x=>{
        const title=x.news_title||x.title||''; if(!title) return;
        if(DB.data.market.items.some(it=>it.news_title===title)) return;
        const it=MarketAI.newItem(title, x.news_content||x.content||'');
        it.source_name=x.source_name||x.source||''; it.source_url=x.source_url||x.url||''; it.publish_date=x.publish_date||x.date||U.today();
        it.category_type=x.category_type||it.category_type; it.target_sectors=x.target_sectors||[]; it.authenticity=x.authenticity||it.authenticity;
        MarketAI.analyze(it); DB.data.market.items.push(it); added++;
      });
      DB.data.market.lastFetch=U.today(); DB.save();
      const follow=DB.data.market.follow||[];
      if(!silent){
        if(added){
          if(follow.length) toast('已联网检索并新增 '+added+' 条；「收录资讯」已按关注板块「'+follow.join('、')+'」过滤显示 ✅');
          else toast('已联网检索并新增 '+added+' 条资讯，下方「收录资讯」已同步更新 ✅');
        } else toast('已是最新（无新增）');
      } else if(added) toast('自动联网检索新增 '+added+' 条');
      // 同步刷新「收录资讯」区：list tab 必刷新，advice tab 顺带刷新；collect/week 不打断用户当前视图
      if(curRoute==='m/market') renderMarket();
    })
    .catch(e=>{ if(silent) return; toast('联网检索失败：端点 '+ep+' 无法访问。请到「设置→理财趋势资讯端点」检查地址，或确认后端服务（fetch-server.js）已启动。'); });
}

function mkAddDealByText(raw){
  const text=raw.trim();
  const pm=text.match(/(淘宝|拼多多|京东|抖音|美团|支付宝)/);
  const plat=pm?pm[1]:'其他';
  let type='折扣券';
  if(/免费|0元|0元购|白嫖|不要钱/.test(text)) type='免费';
  else if(/返利|返现|返钱|回血/.test(text)) type='返利';
  else if(/红包/.test(text)) type='红包';
  else if(/券|优惠券/.test(text)) type='折扣券';
  else if(/折扣|特价|便宜|划算|五折|半价|秒杀/.test(text)) type='折扣';
  let name=text.replace(/(淘宝|拼多多|京东|抖音|美团|支付宝)/,'').replace(/(免费|0元|0元购|白嫖|返利|返现|返钱|红包|优惠券|折扣券|折扣|特价|便宜|划算|秒杀|记录|记|添加|加|收集|一条|羊毛|：|:|：)/g,'').trim();
  if(!name) name=text;
  const it={id:U.uid(),platform:plat,type,name:name||'未命名',cat:'物品',desc:'',url:'',expire:'',status:'待领',amount_saved:0,date:U.today(),created:Date.now()};
  DB.data.saveasy.deals.push(it); DB.save();
  return {reply:'已收录羊毛 🐑\n平台：'+plat+' ｜ 类型：'+type+' ｜ 物品：'+it.name+'\n去「省钱助手」补领取链接、省下金额，领到后标记「已领」。', goto:'m/saveasy', quick:['淘宝优惠怎么找','省钱打卡']};
}

function computeStreaks(){
  const d=DB.data; const days=arr=>new Set(arr.map(x=>x.date||(x.doneDate)));
  const studyDays=days(d.study.tasks.filter(x=>x.done));
  const saveDays=new Set(d.save.flows.map(x=>x.date));
  const weightDays=new Set(d.weight.records.filter(r=>!r.type).map(x=>x.date));
  const dietDays=new Set(Object.keys(d.diet.byDate).filter(dt=>Object.keys(d.diet.byDate[dt].meals||{}).length));
  const streak=set=>{ let n=0; let cur=U.today(); while(set.has(cur)){ n++; cur=U.fmt(U.addDays(cur,-1)); } return n; };
  const best=set=>{ let best=0,run=0,prev=null;
    Array.from(set).sort().forEach(dt=>{ if(prev&&U.fmt(U.addDays(prev,1))===dt) run++; else run=1; best=Math.max(best,run); prev=dt; }); return best; };
  return { study:{cur:streak(studyDays),best:best(studyDays)}, save:{cur:streak(saveDays),best:best(saveDays)}, weight:{cur:streak(weightDays),best:best(weightDays)}, diet:{cur:streak(dietDays),best:best(dietDays)} };
}

    <div class="badge ${o.cur>=3?'on':''} mt" style="display:inline-flex">${ico}${o.cur>=3?'<span class="lk">🏅</span>':''}</div></div>`;

/* 联网抓取：用户配置本地抓取服务端点后，真实拉取抖音/小红书最新热点 */
const NET = {
  async fetchDailyTopics(){
    const ep=DB.data.settings.net.endpoint; if(!ep) return null;
    const ind=DB.data.settings.net.industry||'';
    try{
      const r=await fetch(ep+(ep.includes('?')?'&':'?')+'date='+U.today()+(ind?'&industry='+encodeURIComponent(ind):''));
      const j=await r.json();
      let arr=Array.isArray(j)?j:(j.items||j.topics||null);
      if(arr&&arr.length) return arr.map(x=>({
        title:x.title, url:x.url||'', heat:x.heat||'中',
        follow:x.follow||x.way||'', remake:x.remake||x.tip||'',
        platform:x.platform||(/小红/.test(x.title)?'小红书':'抖音')
      }));
    }catch(e){ console.warn('联网抓取失败',e); }
    return null;
  }
};
function pickRot(arr,n,off){ const r=[]; for(let i=0;i<n;i++) r.push(arr[((i+off)%arr.length+arr.length)%arr.length]); return r; }
function ensureIdeasDaily(){
  const t=U.today();
  if(DB.data.ideas.daily.date===t && DB.data.ideas.daily.items.length){
    if(DB.data.settings.net.auto && DB.data.settings.net.endpoint) refreshTopicsNet(true);
    return;
  }
  const idx=Math.floor(Date.parse(t)/86400000)%7;
  const items=[
    ...pickRot(DAILY_TOPIC_DB.douyin,6,idx).map(x=>({...x,id:U.uid(),platform:'抖音'})),
    ...pickRot(DAILY_TOPIC_DB.xhs,6,idx+2).map(x=>({...x,id:U.uid(),platform:'小红书'}))
  ];
  DB.data.ideas.daily={date:t,items,platform:'all'}; DB.save();
  if(DB.data.settings.net.auto && DB.data.settings.net.endpoint) refreshTopicsNet(true);
}
function refreshTopicsLocal(){
  const off=Math.floor(Math.random()*DAILY_TOPIC_DB.douyin.length);
  const items=[
    ...pickRot(DAILY_TOPIC_DB.douyin,6,off).map(x=>({...x,id:U.uid(),platform:'抖音'})),
    ...pickRot(DAILY_TOPIC_DB.xhs,6,off+3).map(x=>({...x,id:U.uid(),platform:'小红书'}))
  ];
  DB.data.ideas.daily={date:U.today(),items,platform:'all'}; DB.save(); renderIdeas();
}
async function refreshTopicsNet(silent){
  const ep=DB.data.settings.net.endpoint;
  if(!ep){ if(!silent) toast('未配置联网端点，请到「设置 → 联网抓取」填写本地抓取服务地址'); return; }
  if(!silent) toast('正在联网抓取最新选题…');
  const items=await NET.fetchDailyTopics();
  if(items&&items.length){
    const arr=items.map(x=>({...x,id:U.uid()}));
    DB.data.ideas.daily={date:U.today(),items:arr,platform:'all'}; DB.save();
    if(!silent) toast('已联网更新 '+arr.length+' 条真实热点 🌐');
    if(curRoute==='m/ideas') renderIdeas();
  } else if(!silent) toast('联网抓取失败（检查端点或抓取服务是否运行）');
}
function saveTopic(id){
  const h=DB.data.ideas.daily.items.find(x=>x.id===id); if(!h) return;
  DB.data.ideas.items.push({id:U.uid(),title:h.title,idea:`来源平台：${h.platform}\n跟上做法：${h.follow}\n二改方法：${h.remake}`,status:'todo',tags:[h.platform,'热点'],audience:'',form:'短视频',difficulty:'中',created:U.today()});
  Store.emit('ideas'); toast('已存为灵感 ✅');
}

/* ============ 初始化 ============ */
function markOverdue(){ let c=0; DB.data.work.tasks.forEach(t=>{ if(t.status==='todo'&&t.deadline&&t.deadline<U.today()){ t.status='overdue'; c++; } }); if(c) DB.save(); }
function checkReminders(){
  ensureReminders(); const now=U.nowMin();
  DB.data.reminders.forEach(r=>{ if(r.on && r.time===now){ toast('🔔 '+r.label+' 时间到'); if(r.type==='study') go('m/study'); } });
}
function boot(){
  DB.load();
  if(!DB.data.settings.net) DB.data.settings.net={endpoint:'',auto:false,industry:'office,beauty'};
  else if(!DB.data.settings.net.industry) DB.data.settings.net.industry='office,beauty';
  if(!DB.data.ideas.daily) DB.data.ideas.daily={date:'',items:[],platform:'all'};
  markOverdue(); ensureDailyContent(); ensureIdeasDaily(); renderSidebar(); renderNav(); go('home');
  setInterval(checkReminders,60000);
  // PWA: 注册 Service Worker（仅 http(s) 环境下生效，file:// 不注册）
  if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
    navigator.serviceWorker.register('sw.js').then(function(){}).catch(function(){});
  }
}
if(document.readyState!=='loading') boot(); else document.addEventListener('DOMContentLoaded',boot);
