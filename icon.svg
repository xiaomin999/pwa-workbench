<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="1" stop-color="#5b8bff"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- 浅色底环（习惯进度轨道） -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="26"/>
  <!-- 进度环（约 75% 完成度） -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-width="26"
    stroke-linecap="round" stroke-dasharray="565 754" transform="rotate(-90 256 256)"/>
  <!-- 对勾 -->
  <path d="M206 262 L240 298 L308 218" fill="none" stroke="#ffffff" stroke-width="30"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
